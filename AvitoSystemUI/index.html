// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((key, val) => {
    setValues((prev) => ({ ...prev, [key]: val }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});
</script>
<script type="text/babel" data-presets="react">/* global React */
// Shared UI components for Avito Monitor screens.

// ─── ConditionChip ───────────────────────────────────────────────────
function ConditionChip({ value, theme }) {
  const meta = AM_COND[value] || AM_COND.unknown;
  const label = theme === 'trader' ? meta.trader : meta.avito;
  return <span className={`am-chip ${meta.cls}`}>{label}</span>;
}

// ─── PriceTag ────────────────────────────────────────────────────────
function PriceTag({ value, delta }) {
  return (
    <span>
      <span className="am-price">{AM_FMT.price(value)}</span>
      {delta != null && (
        <span className={`am-price-delta ${delta < 0 ? 'neg' : 'pos'}`}>
          {delta < 0 ? '▼' : '▲'} {Math.abs(delta).toFixed(1)}%
        </span>
      )}
    </span>
  );
}

// ─── DualPriceRange ─────────────────────────────────────────────────
function DualPriceRange({ searchMin, searchMax, alertMin, alertMax, mini = false, currentMedian }) {
  // Map prices onto a [0%..100%] coordinate over the search span
  const range = searchMax - searchMin;
  const pct = (v) => Math.max(0, Math.min(100, ((v - searchMin) / range) * 100));
  const aMin = pct(alertMin);
  const aMax = pct(alertMax);
  const medPct = currentMedian != null ? pct(currentMedian) : null;

  return (
    <div className={`am-dpr ${mini ? 'am-dpr-mini' : ''}`}>
      <div className="am-dpr-track">
        <div className="am-dpr-search" style={{ left: '0%', right: '0%' }} />
        <div className="am-dpr-alert" style={{ left: `${aMin}%`, width: `${aMax - aMin}%` }} />
        {/* tick labels above */}
        <div className="am-dpr-tick" style={{ left: '0%' }}>
          <div className="v">{AM_FMT.priceShort(searchMin)}</div>
        </div>
        <div className="am-dpr-tick" style={{ left: `${aMin}%` }}>
          <div className="v">{AM_FMT.priceShort(alertMin)}</div>
        </div>
        <div className="am-dpr-tick" style={{ left: `${aMax}%` }}>
          <div className="v">{AM_FMT.priceShort(alertMax)}</div>
        </div>
        <div className="am-dpr-tick" style={{ left: '100%' }}>
          <div className="v">{AM_FMT.priceShort(searchMax)}</div>
        </div>
        {/* median marker */}
        {medPct != null && (
          <div style={{position:'absolute', top:-4, bottom:-4, left:`${medPct}%`, width:2, background:'var(--accent)', borderRadius:1}}>
            <div style={{position:'absolute', bottom:'100%', left:'50%', transform:'translateX(-50%)', fontSize:10, fontFamily:'var(--font-mono)', color:'var(--accent)', whiteSpace:'nowrap', marginBottom:2}}>★ {AM_FMT.priceShort(currentMedian)}</div>
          </div>
        )}
        {/* labels below */}
        {!mini && (
          <>
            <div className="am-dpr-label" style={{ left: '50%' }}>SEARCH ZONE</div>
            <div className="am-dpr-label" style={{ left: `${(aMin + aMax)/2}%`, color: 'var(--positive)' }}>ALERT</div>
          </>
        )}
      </div>
    </div>
  );
}

<script type="text/babel" data-presets="react">/* global React, TopBar, Sidebar, Kpi, MarketEventRow, DualPriceRange, AM_DATA, Chart */

function ScreenProfileStats({ theme }) {
  const useEffect = React.useEffect;
  const useRef = React.useRef;

  const D = AM_DATA;
  const lineRef = useRef(null);
  const histRef = useRef(null);
  const donutRef = useRef(null);

  useEffect(() => {
    if (!window.Chart) return;
    const isTrader = theme === 'trader';
    const grid = isTrader ? 'rgba(48,54,61,0.5)' : 'rgba(225,228,232,0.6)';
    const text = isTrader ? '#8B949E' : '#5C6878';
    const lineColor = isTrader ? '#58A6FF' : '#97CF26';
    const fill = isTrader ? 'rgba(88,166,255,0.13)' : 'rgba(151,207,38,0.16)';
    const fontFamily = isTrader ? "'JetBrains Mono', monospace" : "'Inter', sans-serif";

    const charts = [];
    // Line chart
    if (lineRef.current) {
      const ctx = lineRef.current.getContext('2d');
      charts.push(new Chart(ctx, {
        type: 'line',
        data: {
          labels: D.history.map(h => h.d),
          datasets: [
            {
              label: 'Median (clean)',
              data: D.history.map(h => h.median),
              borderColor: lineColor,
              backgroundColor: fill,
              borderWidth: isTrader ? 1.5 : 2,
              fill: true,
              tension: isTrader ? 0 : 0.3,
              pointRadius: isTrader ? 0 : 2.5,
              pointHoverRadius: 5,
              pointBackgroundColor: lineColor,
            }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            // Alert band annotation drawn via custom plugin
          },
          scales: {
            y: {
              grid: { color: grid },
              ticks: { color: text, font: { family: fontFamily, size: 10 }, callback: (v) => (v/1000).toFixed(0)+'K' },
              min: 7000, max: 19000,
            },
            x: {
              grid: { color: grid, display: false },
              ticks: { color: text, font: { family: fontFamily, size: 10 }, maxTicksLimit: 8 },
            }
          }
        },
        plugins: [{
          id: 'alertBand',
          beforeDatasetsDraw(chart) {
            const {ctx, chartArea, scales} = chart;
            const yMin = scales.y.getPixelForValue(11000);
            const yMax = scales.y.getPixelForValue(13500);
            ctx.save();
            ctx.fillStyle = isTrader ? 'rgba(63,185,80,0.08)' : 'rgba(151,207,38,0.18)';
            ctx.fillRect(chartArea.left, yMax, chartArea.right - chartArea.left, yMin - yMax);
            ctx.strokeStyle = isTrader ? 'rgba(63,185,80,0.5)' : 'rgba(151,207,38,0.7)';
            ctx.setLineDash([4,4]);
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(chartArea.left, yMin); ctx.lineTo(chartArea.right, yMin); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(chartArea.left, yMax); ctx.lineTo(chartArea.right, yMax); ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = isTrader ? '#3FB950' : '#5A8C00';
            ctx.font = `10px ${fontFamily}`;
            ctx.fillText('alert max 13.5K', chartArea.right - 90, yMax - 4);
            ctx.fillText('alert min 11.0K', chartArea.right - 90, yMin + 12);
            ctx.restore();
          }
        }]
      }));
    }

    // Histogram
    if (histRef.current) {
      const buckets = [
        { label: '8K',  working: 0, broken: 0, parts: 1 },
        { label: '9K',  working: 0, broken: 0, parts: 0, icloud: 1 },
        { label: '10K', working: 0, broken: 0, parts: 0 },
        { label: '11K', working: 0, broken: 1, parts: 0 },
        { label: '12K', working: 1, broken: 0, parts: 0, icloud: 1 },
        { label: '13K', working: 4, broken: 1, parts: 0 },
        { label: '14K', working: 1, broken: 0, parts: 0 },
        { label: '15K', working: 0, broken: 0, parts: 0 },
        { label: '16K', working: 1, broken: 0, parts: 0 },
      ];
      const ctx = histRef.current.getContext('2d');
      charts.push(new Chart(ctx, {
        type: 'bar',
        data: {
          labels: buckets.map(b => b.label),
          datasets: [
            { label: 'working', data: buckets.map(b => b.working || 0), backgroundColor: isTrader ? '#3FB950' : '#97CF26', stack: 's' },
            { label: 'broken',  data: buckets.map(b => b.broken  || 0), backgroundColor: isTrader ? '#F85149' : '#DC3545', stack: 's' },
            { label: 'iCloud',  data: buckets.map(b => b.icloud  || 0), backgroundColor: isTrader ? '#D29922' : '#FFB900', stack: 's' },
            { label: 'parts',   data: buckets.map(b => b.parts   || 0), backgroundColor: isTrader ? '#6E7681' : '#8C95A1', stack: 's' },
          ],
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: true, labels: { color: text, font: { family: fontFamily, size: 10 } } } },
          scales: {
            x: { stacked: true, grid: { display: false }, ticks: { color: text, font: { family: fontFamily, size: 10 } } },
            y: { stacked: true, grid: { color: grid }, ticks: { color: text, font: { family: fontFamily, size: 10 }, stepSize: 1 }, min: 0, max: 6 },
          }
        }
      }));
    }

    // Donut
    if (donutRef.current) {
      const ctx = donutRef.current.getContext('2d');
      charts.push(new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['working','iCloud-блок','разбит экран','поломка','на запчасти'],
          datasets: [{
            data: [5,3,2,1,1],
            backgroundColor: isTrader
              ? ['#3FB950','#D29922','#F85149','#BC8CFF','#6E7681']
              : ['#97CF26','#FFB900','#DC3545','#9966CC','#8C95A1'],
            borderWidth: 0,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false, cutout: '65%',
          plugins: { legend: { position: 'right', labels: { color: text, font: { family: fontFamily, size: 11 } } } }
        }
      }));
    }

    return () => charts.forEach(c => c.destroy());
  }, [theme]);

  return (
    <div className={`am-screen theme-${theme}`}>
      <TopBar theme={theme}/>
      <Sidebar active="profiles"/>
      <div className="am-content scroll-y">
        <div className="am-page-h">
          <div>
            <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:4}}>← К списку профилей</div>
            <h1 style={{display:'flex',alignItems:'center',gap:10}}>
              <span className="am-dot on"></span>
              {D.profile.name}
            </h1>
            <div style={{fontSize:12,color:'var(--text-secondary)',marginTop:4}}>
              Apple / iPhone 12 Pro Max / Москва · 5 мин · 09–23 · последний прогон 25.04 10:34
            </div>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button className="am-btn am-btn-sm">⏸ Пауза</button>
            <button className="am-btn am-btn-sm">⚙ Редакт.</button>
            <button className="am-btn am-btn-primary am-btn-sm">📦 Посмотреть лоты (12)</button>
          </div>
        </div>

        <div className="am-kpi-row">
          <Kpi label="Лотов 24ч" value="12" delta="+4 новых" deltaCls="pos"/>
          <Kpi label="В alert-зоне" value="7" delta="working: 5"/>
          <Kpi label="Медиана (clean)" value="13 050 ₽" delta="▼ 9.6% / 30д" deltaCls="neg"/>
          <Kpi label="Working share" value="41.7%" delta="+5% / неделя" deltaCls="pos"/>
        </div>

        <div style={{display:'grid', gridTemplateColumns:'1.4fr 1fr', gap:14}}>
          <div className="am-card">
            <div className="am-card-h">
              <h3>Динамика цены — 30 дней</h3>
              <div className="am-chips-row">
                <button className="am-fchip active">Median clean</button>
                <button className="am-fchip">Median raw</button>
                <button className="am-fchip">Min</button>
                <button className="am-fchip">Max</button>
              </div>
            </div>
            <div style={{height:240, position:'relative'}}>
              <canvas ref={lineRef}></canvas>
            </div>
            <div style={{fontSize:11,color:'var(--text-muted)',marginTop:8}}>
              Пунктирная зона = alert-вилка · Текущая median: <span style={{color:'var(--text-primary)',fontWeight:600}} className="mono">13 050 ₽</span> <span style={{color:'var(--negative)'}} className="mono">▼ 9.6%</span>
            </div>
          </div>

          <div className="am-card">
            <div className="am-card-h"><h3>Состав по состояниям</h3></div>
            <div style={{height:240, position:'relative'}}>
              <canvas ref={donutRef}></canvas>
            </div>
            <div style={{fontSize:11,color:'var(--text-muted)',marginTop:8,textAlign:'center'}}>
              Из 12 лотов · working = 5 (41.7%)
            </div>
          </div>
        </div>

        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:14, marginTop:14}}>
          <div className="am-card">
            <div className="am-card-h">
              <h3>Цены лотов сейчас (n=12)</h3>
            </div>
            <div style={{height:200, position:'relative'}}>
              <canvas ref={histRef}></canvas>
            </div>
            <div style={{fontSize:11,color:'var(--text-muted)',marginTop:8}}>
              Зелёная подложка под X-осью = alert-вилка 11–13.5K ₽
            </div>
          </div>

          <div className="am-card">
            <div className="am-card-h">
              <h3>События рынка — 7 дней</h3>
              <span className="am-link">→ Все</span>

            <div style={{maxHeight:200, overflowY:'auto'}}>
              {D.events.map((e,i) => <MarketEventRow key={i} event={e} theme={theme}/>)}
            </div>
          </div>
        </div>

        {/* Auto-recommend alert range */}
        <div className="am-card" style={{marginTop:14, background: theme==='trader' ? 'color-mix(in srgb, var(--accent) 6%, var(--surface))' : 'var(--brand-soft)', borderColor: 'var(--accent)'}}>

              <div style={{fontSize:13,fontWeight:600,marginBottom:4}}>💡 Авто-рекомендация alert-вилки</div>

                &nbsp;&nbsp;·&nbsp;&nbsp;Рекомендую (по медиане 13 050 и p25/p75):

              </div>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button className="am-btn am-btn-sm">Игнорировать</button>
              <button className="am-btn am-btn-primary am-btn-sm">Применить</button>

        <div className="am-state-note" style={{marginTop:14}}>

          &nbsp;&nbsp;<span className="lbl">Stale</span>«Данные устарели — последний прогон 18 минут назад» (серый баннер).

  );
}

function renderLine(line) {
  if (!line || !line.length) return <div style={{height:6}}></div>;
  return line.map((part, i) => {
    if (typeof part === 'string') return <span key={i}>{part}</span>;
    if (part.b) return <b key={i}>{part.b}</b>;
    if (part.m) return <span key={i} style={{color:'rgba(255,255,255,0.5)'}}>{part.m}</span>;
    if (part.strike) return <span key={i} style={{textDecoration:'line-through',color:'rgba(255,255,255,0.45)'}}>{part.strike}</span>;
    return null;
  });
}

function renderLineMax(line) {
  if (!line || !line.length) return <div style={{height:6}}></div>;
  return line.map((part, i) => {
    if (typeof part === 'string') return <span key={i}>{part}</span>;
    if (part.b) return <b key={i}>{part.b}</b>;
    if (part.m) return <span key={i} style={{color:'#8C95A1'}}>{part.m}</span>;
    if (part.strike) return <span key={i} style={{textDecoration:'line-through',color:'#8C95A1'}}>{part.strike}</span>;
    return null;
  });
}

function TGBubble({ title, lines, actions, time }) {
  return (
    <div className="am-msg-bubble">
      <div className="am-msg-title">{title}</div>
      <div style={{display:'flex',flexDirection:'column',gap:2,fontSize:12.5,lineHeight:1.5}}>
        {lines.map((l,i) => <div key={i}>{renderLine(l)}</div>)}
      </div>
      <div className="am-msg-actions">
        {actions.map((a,i) => <span key={i} className="am-msg-action">{a}</span>)}
      </div>
      <div className="am-msg-meta">{time}</div>
    </div>
  );
}

function MaxBubble({ title, lines, actions, time }) {
  return (
    <div className="am-msg-bubble max">
      <div className="am-msg-title" style={{color:'#1B1F26'}}>{title}</div>
      <div style={{display:'flex',flexDirection:'column',gap:2,fontSize:13.5,lineHeight:1.5,color:'#1B1F26'}}>
        {lines.map((l,i) => <div key={i}>{renderLineMax(l)}</div>)}
      </div>
      <div className="am-msg-actions">
        {actions.map((a,i) => <span key={i} className="am-msg-action max">{a}</span>)}
      </div>
      <div className="am-msg-meta">{time}</div>
    </div>
  );
}

function Sparkline({ data, trend, large }) {
  const w = large ? 320 : 140;
  const h = large ? 50 : 28;
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const points = data.map((v, i) => {
    const x = (i / (data.length - 1)) * w;
    const y = h - ((v - min) / range) * (h - 4) - 2;
    return `${x},${y}`;
  }).join(' ');
  const color = trend === 'down' ? '#2EBF5C' : trend === 'up' ? '#DC3545' : '#8C95A1';
  return (
    <svg width={w} height={h} style={{display:'block'}}>
      <polyline points={points} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
      <circle cx={(data.length - 1) / (data.length - 1) * w} cy={h - ((data[data.length-1] - min) / range) * (h - 4) - 2} r="2.5" fill={color}/>
    </svg>
  );
}
