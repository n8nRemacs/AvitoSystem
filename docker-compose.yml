services:
  xapi:
    build: ./avito-xapi
    ports:
      - "8080:8080"
    env_file: ./avito-xapi/.env
    restart: unless-stopped

  tenant-auth:
    build: ./tenant-auth
    ports:
      - "8090:8090"
    env_file: ./tenant-auth/.env
    depends_on:
      - xapi
    restart: unless-stopped

  frontend:
    build: ./avito-frontend
    ports:
      - "3000:80"
    depends_on:
      - xapi
    restart: unless-stopped
