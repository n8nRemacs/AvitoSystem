# Homelab dev override — apply with:
#   docker compose -f docker-compose.yml -f docker-compose.homelab.yml up -d
#
# Why we need this on homelab:
# 1. Bind-mount ``./src`` so iteration doesn't require a rebuild. The
#    Proxmox LXC blocks AF_UNIX socketpair() under the default docker
#    apparmor profile, which kills ``uv`` mid-resolve and makes a full
#    ``docker compose build`` impossible. Mounting the source lets us
#    iterate against the working pip-installed image instead.
# 2. ``--reload`` so saved files take effect without a manual restart.
services:
  xapi:
    volumes:
      - ./src:/app/src
      # Bind-mount /dev/bus/usb (not just devices:) so adb sees phones
      # that get re-plugged after container start (hot-plug).
      - /dev/bus/usb:/dev/bus/usb
    device_cgroup_rules:
      # Allow all USB devices (major 189 = usbdevfs) regardless of
      # minor. Without this, cgroup-v2 BPF denies access to phones
      # plugged after container start (their minor differs from the
      # one captured by `devices:` at container creation time).
      - "c 189:* rwm"
    command:
      - uvicorn
      - src.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --loop
      - asyncio
      - --reload
