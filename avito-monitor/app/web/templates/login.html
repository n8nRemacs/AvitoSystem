{% extends "base.html" %}
{% block title %}Login — Avito Monitor{% endblock %}
{% block body %}
<div class="flex min-h-screen items-center justify-center px-4">
    <div class="card w-full max-w-md bg-base-100 shadow-xl">
        <div class="card-body">
            <h1 class="card-title text-2xl">Avito Monitor</h1>
            <p class="text-sm opacity-60 mb-4">Вход для администратора</p>

            {% if error %}
            <div class="alert alert-error mb-4">
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form method="post" action="/login" class="space-y-4">
                <label class="form-control w-full">
                    <span class="label-text mb-1">Логин</span>
                    <input type="text" name="username" class="input input-bordered" required autofocus>
                </label>
                <label class="form-control w-full">
                    <span class="label-text mb-1">Пароль</span>
                    <input type="password" name="password" class="input input-bordered" required>
                </label>
                <button type="submit" class="btn btn-primary w-full">Войти</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
