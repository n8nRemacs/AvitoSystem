  severity_hint: green
  opener_phrasing: "погнута средняя часть корпуса"
- key: case.midframe_cracked
  kind: defect
  section: case
  title: Средняя часть корпуса сломана
  default_phrasing: "На корпусе нет трещин или сломов?"
