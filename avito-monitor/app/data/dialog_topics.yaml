# ---------- Phase 2.1: new defect keys (4) ----------
- key: sensors.touch_id
  kind: defect
  section: sensors
  title: "Не работает Touch ID"
  default_phrasing: "Touch ID работает корректно?"
  expected_format: yesno
  severity_hint: red
  opener_phrasing: "не работает Touch ID"
  prompt_fragment: |
    Цель: определить состояние сканера отпечатка пальца (Touch ID).
    defect — продавец прямо упоминает неработающий Touch ID, либо «сенсор отпечатка не работает», «touchID сломан».
    ok — продавец прямо подтверждает работу Touch ID.
    unknown — Touch ID не упомянут, либо модель явно без Touch ID (iPhone X+).

- key: locks.frp_locked
  kind: defect
  section: locks
  title: "FRP / MDM-блокировка"
  default_phrasing: "Привязан ли к чужому Google-аккаунту или корпоративному профилю?"
  expected_format: yesno
  severity_hint: red
  opener_phrasing: "FRP-блокировка или MDM"
  prompt_fragment: |
    Цель: определить наличие FRP / MDM / corporate-block.
    defect — упоминания «привязан к Google», «FRP-lock», «MDM», «корпоративный профиль», «не сбрасывается без логина владельца».
    ok — продавец подтверждает что устройство чистое.
    unknown — нет упоминаний.

- key: locks.vendor_account
  kind: defect
  section: locks
  title: "Заблокирован Mi/Samsung/Huawei аккаунтом"
  default_phrasing: "Привязан ли к чужому Mi/Samsung/Huawei-аккаунту?"
  expected_format: yesno
  severity_hint: red
  opener_phrasing: "vendor account block"
  prompt_fragment: |
    Цель: определить vendor-account block (не iCloud, не FRP).
    defect — упоминания «привязан к Mi/Samsung/Huawei», «Xiaomi-аккаунт нужен», «не сбрасывается без аккаунта владельца» (на не-Apple устройстве).
    ok — устройство чистое.
    unknown — нет упоминаний.

- key: operability.parts_only
  kind: defect
  section: operability
  title: "Продаётся только на запчасти"
  default_phrasing: "Лот продаётся только на запчасти?"
  expected_format: yesno
  severity_hint: red
  opener_phrasing: "только на запчасти"
  prompt_fragment: |
    Цель: определить intent-based parts-only sale.
    defect — explicit «на запчасти», «на разбор», «нерабочий, продаю как комплект».
    ok — продавец продаёт как рабочее устройство.
    unknown — нет explicit указания.

# ---------- Phase 2.1: price_signal features (2) ----------
- key: battery_health
  kind: price_signal
  title: "АКБ"
  prompt_fragment: |
    Извлеки информацию об аккумуляторе.
    Если упомянут процент — верни {"percent": N}.
    Если состояние словесно ("новый", "родной", "слабый", "садится быстро") — верни {"text": "..."}.
    Если ничего не сказано — верни null.

- key: repaired_components
  kind: price_signal
  title: "Заменено"
  prompt_fragment: |
    Перечисли заменённые/отремонтированные компоненты.
    Для каждого компонента (экран, АКБ, корпус, разъём, динамик, камера, и т.п.) определи quality:
    - original: явно сказано «оригинал», «service center», «Apple Genuine», «родной»
    - aftermarket: «копия», «китайский аналог», «совместимый», «не оригинал»
    - unknown: качество не указано
    Верни {"items": [{"component": "...", "quality": "original|aftermarket|unknown", "evidence": "цитата из описания"}]} или null если замен не упомянуто.

# ---------- Phase 2.1: info_api features (3) ----------
- key: memory_gb
  kind: info_api
