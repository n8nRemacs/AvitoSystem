# Global library for V2 LLM pipeline. Source of truth for the
# `criteria_templates` table — the seed migration upserts rows from
# this file (idempotent on `key`).
#
# Bump `version` when changing `prompt_fragment` or `params_schema` —
# any in-flight `llm_analyses` cache rows tied to the old version
# become stale and the worker will re-grade affected listings.
#
# Prompt design principles (post 2026-05-10 rewrite):
#   * Differentiate STATE vs marketing copy. Sellers add phrases like
#     "подойдёт для восстановления или для запчастей" to widen their
#     audience — that's not a confession that the device is dead, it's
#     ad copy. Trigger-word matching produces false positives.
#   * Look for an EXPLICIT statement of the negative state ("не
#     работает", "не включается", "залочен под Apple ID владельца")
#     before flipping to red.
#   * Working/clean signals should win over single trigger words:
#     "в рабочем состоянии", "включается", "iCloud отвязан" → green
#     even if the listing also mentions cosmetic issues like a cracked
#     screen.
#   * When evidence is thin or contradictory → unknown, not red.

# ---------------------------------------------------------------------
# Hard criteria (LLM returns red/green/unknown + confidence + reasoning)
# ---------------------------------------------------------------------

- key: icloud_locked
  kind: criterion
  title_ru: "Залочен на iCloud"
  description_ru: "Aktivation Lock / Find My / привязан к Apple ID — устройство нельзя сбросить без пароля владельца."
  prompt_fragment: |
    Цель: определить, заблокирован ли телефон на iCloud прежнего владельца
    (Activation Lock, Find My iPhone, требует чужой Apple ID для активации).

    red — явное указание на блокировку: «залочен на iCloud», «привязан к
    чужому Apple ID», «требует Apple ID владельца», «найди айфон не
    отключён», «не отвязан».

    green — явное указание что телефон чист: «iCloud отвязан/отключён»,
    «чистый iCloud», «не привязан к Apple ID», «свободен от Apple ID»,
    «снят с учётной записи».

    unknown — iCloud вообще не упомянут, либо упомянут только как
    нейтральное упоминание Apple-сервиса без статусной оценки.

    Не путай: «Apple ID чистый, разблокирован» = green (статус), а не red.
  version: 2

- key: screen_broken
  kind: criterion
  title_ru: "Разбит экран"
  description_ru: "Дисплей или тачскрин повреждён."
  prompt_fragment: |
    Цель: определить, есть ли реальные повреждения экрана (трещины,
    разбит, нерабочий тачскрин, выгоревшая матрица, пятна, полосы,
    битые пиксели).

    red — продавец прямо описывает повреждение экрана: «разбит экран»,
    «треснутый дисплей», «не работает тачскрин», «выгорела матрица».

    green — явное утверждение что экран целый: «экран без трещин»,
    «дисплей идеальный», «без сколов и царапин на экране», «новое
    стекло».

    unknown — экран не упомянут, либо упомянут только в контексте
    замены/ремонта без указания текущего состояния.

    Не red на отрицания: «без трещин», «без царапин», «нет битых
    пикселей» → green, не red. Учитывай контекст всей фразы.
  version: 2

- key: not_starting
  kind: criterion
  title_ru: "Не включается"
  description_ru: "Устройство не загружается."
  prompt_fragment: |
    Цель: определить, является ли устройство нерабочим в смысле
    «не запускается совсем» (бутлуп, чёрный экран, не реагирует на
    зарядку, требует замены матплаты).

    red — продавец прямо заявляет неработоспособность: «не включается»,
    «не загружается», «бутлуп», «не реагирует ни на что», «нужна замена
    материнской платы», «после падения не подаёт признаков жизни».

    green — продавец прямо подтверждает работоспособность: «работает»,
    «в рабочем состоянии», «включается», «полностью исправен», «всё
    работает». Эти фразы перевешивают косметические дефекты (разбитый
    экран, треснутая крышка) — устройство всё равно работает.

    unknown — состояние работоспособности явно не описано, или есть
    противоречия которые не разрешить из текста.

    Маркетинговые фразы продавца про множественные применения
    («подойдёт для использования или для восстановления») сами по себе
    НЕ означают что устройство не работает.
  version: 2

- key: frp_locked
  kind: criterion
  title_ru: "FRP / MDM-блокировка"
  description_ru: "Заблокирован чужим Google-аккаунтом или корпоративным профилем."
  prompt_fragment: |
    Цель: определить, заблокирован ли Android-телефон чужим Google FRP
    или корпоративным MDM-профилем.

    red — явное указание блокировки: «FRP-лок», «требует чужой Google»,
    «MDM не снять», «корпоративный профиль не отвязать».

    green — явное указание что блокировок нет: «без FRP», «Google
    сброшен», «MDM снят», «чистый, без блокировок».

    unknown — про блокировки ничего не сказано, либо упомянут только
    Google-аккаунт в нейтральном контексте.

    Для iPhone этот критерий не применим — возвращай unknown, FRP это
    Android-механизм.
  version: 2

- key: parts_only
  kind: criterion
  title_ru: "На запчасти"
  description_ru: "Лот заведомо нерабочий, продаётся как комплект деталей."
  prompt_fragment: |
    Цель: определить, продаётся ли лот ИСКЛЮЧИТЕЛЬНО как комплект
    запчастей / донор для разбора (то есть устройство нерабочее и
    использовать по назначению нельзя).

    red — продавец прямо заявляет что устройство нерабочее и предлагает
    его только как источник деталей: «не работает, продаю на запчасти»,
    «только на разбор», «донор для замены экрана», «по частям, целиком
    не нужен».

    green — продавец явно подтверждает работоспособность: «в рабочем
    состоянии», «работает», «полностью исправен», «включается». Это
    перевешивает упоминания «запчастей» как маркетинговые опции.

    unknown — нет ясного утверждения работоспособности и нет ясного
    утверждения нерабочего состояния.

    Важно — НЕ красить red в этих случаях:
    * «отличный вариант для восстановления или для запчастей» — это
      продавец предлагает несколько применений (восстановить ИЛИ
      разобрать), а не диагноз нерабочего состояния.
    * «продаются также запчасти к этой модели» — речь про другие лоты.
    * «можно оставить себе или разобрать на запчасти» — выбор
      покупателя, не статус устройства.

    Триггер для red — комбинация (устройство НЕ работает) + (продаётся
    на разбор), а не одно лишь упоминание слова «запчасти».
  version: 2

- key: account_blocked
  kind: criterion
  title_ru: "Заблокирован аккаунтом (не iCloud)"
  description_ru: "Сторонний аккаунт блокирует устройство (не iCloud, не FRP)."
  prompt_fragment: |
    Цель: определить, заблокировано ли устройство сторонним фирменным
    аккаунтом — Mi-аккаунт (Xiaomi), Samsung Account, Huawei ID и т.п.
    Это НЕ iCloud (отдельный критерий) и НЕ Google FRP (отдельный
    критерий).

    red — явное указание блокировки: «привязан к Mi-аккаунту прежнего
    владельца», «Samsung Account не отвязать», «лочка Huawei ID».

    green — явное указание что таких блокировок нет: «Mi-аккаунт
    сброшен», «Samsung Account отвязан», «без блокировок».

    unknown — про сторонние аккаунты ничего не сказано, либо аккаунт
    упомянут нейтрально без статуса.

    Для iPhone этот критерий не применим — возвращай unknown.
  version: 2

- key: memory_gte
  kind: criterion
  title_ru: "Память не ниже X ГБ"
  description_ru: "Объём встроенной памяти должен быть ≥ заданного значения."
  params_schema:
    type: object
    required: [gb]
    properties:
      gb:
        type: integer
        minimum: 8
        maximum: 4096
  prompt_fragment: |
    Объём встроенной памяти устройства должен быть НЕ МЕНЬШЕ {{ params.gb }} ГБ.
    Если в заголовке/описании/параметрах указан объём ≥ {{ params.gb }} → green.
    Если указан меньший объём → red.
    Если объём не указан → unknown.
  version: 1

- key: title_matches_model
  kind: criterion
  title_ru: "Модель в заголовке совпадает"
  description_ru: "Заголовок и описание должны соответствовать одной из заявленных моделей."
  params_schema:
    type: object
    required: [allowed]
    properties:
      allowed:
        type: array
        items: {type: string}
        minItems: 1
  prompt_fragment: |
    Заголовок и описание должны соответствовать одной из этих моделей: {{ params.allowed | join(', ') }}.
    Совпадает → green. Явно другая модель → red. Неоднозначно → unknown.
  version: 1

# ---------------------------------------------------------------------
# Info-LLM (LLM extracts a value, no grading)
# ---------------------------------------------------------------------

- key: battery_health
  kind: info_llm
  title_ru: "Здоровье аккумулятора"
  description_ru: "Процент ёмкости АКБ или состояние."
  prompt_fragment: |
    Если в описании указан процент ёмкости АКБ (например, "АКБ 87%", "ёмкость 92"),
    извлеки число (87 или 92). Если состояние описано словесно ("новый АКБ",
    "родной АКБ", "слабый АКБ") — верни строку. Иначе null.
  version: 1

- key: repaired_components
  kind: info_llm
  title_ru: "Заменённые/отремонтированные компоненты"
  description_ru: "Список компонентов, которые были заменены или отремонтированы."
  prompt_fragment: |
    Перечисли заменённые/отремонтированные компоненты, упомянутые в описании
    (экран, АКБ, корпус, разъём зарядки, динамик и т.п.). Верни массив строк
    или null если не указано.
  version: 1

# ---------------------------------------------------------------------
# Info-API (read directly from listing.parameters, no LLM)
# ---------------------------------------------------------------------

- key: memory_gb
  kind: info_api
  title_ru: "Память (ГБ)"
  description_ru: "Берётся из параметров объявления."
  api_path: "Встроенная память"
  version: 1

- key: color
  kind: info_api
  title_ru: "Цвет"
  api_path: "Цвет"
  version: 1

- key: vendor_model
  kind: info_api
  title_ru: "Бренд / модель"
  api_path: "Производитель"
  version: 1
