services:
  app:
    build:
      context: .
      target: runtime
    image: avito-monitor-app:dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://avito:avito@db:5432/avito_monitor
      REDIS_URL: redis://redis:6379/0
      AVITO_XAPI_URL: ${AVITO_XAPI_URL:-http://host.docker.internal:8080}
      AVITO_XAPI_API_KEY: ${AVITO_XAPI_API_KEY:-test_dev_key_123}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./avito_mcp:/app/avito_mcp
      - ./shared:/app/shared
      - ./scripts:/app/scripts
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./tests:/app/tests
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: avito
      POSTGRES_PASSWORD: avito
      POSTGRES_DB: avito_monitor
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U avito -d avito_monitor"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  health-checker:
    build:
      context: .
      target: runtime
    image: avito-monitor-app:dev
    command: python -m app.services.health_checker
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://avito:avito@db:5432/avito_monitor
      REDIS_URL: redis://redis:6379/0
      AVITO_XAPI_URL: ${AVITO_XAPI_URL:-http://host.docker.internal:8080}
      AVITO_XAPI_API_KEY: ${AVITO_XAPI_API_KEY:-test_dev_key_123}
      HEALTH_CHECKER_API_PORT: "9100"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9100:9100"
    volumes:
      - ./app:/app/app
      - ./avito_mcp:/app/avito_mcp
      - ./shared:/app/shared
      - ./tests:/app/tests
      - ./pyproject.toml:/app/pyproject.toml
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  activity-simulator:
    build:
      context: .
      target: runtime
    image: avito-monitor-app:dev
    command: python -m app.services.activity_simulator
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://avito:avito@db:5432/avito_monitor
      REDIS_URL: redis://redis:6379/0
      AVITO_XAPI_URL: ${AVITO_XAPI_URL:-http://host.docker.internal:8080}
      AVITO_XAPI_API_KEY: ${AVITO_XAPI_API_KEY:-test_dev_key_123}
      ACTIVITY_SIM_API_PORT: "9101"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9101:9101"
    volumes:
      - ./app:/app/app
      - ./avito_mcp:/app/avito_mcp
      - ./shared:/app/shared
      - ./tests:/app/tests
      - ./pyproject.toml:/app/pyproject.toml
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  messenger-bot:
    build:
      context: .
      target: runtime
    image: avito-monitor-app:dev
    command: python -m app.services.messenger_bot
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://avito:avito@db:5432/avito_monitor
      REDIS_URL: redis://redis:6379/0
      AVITO_XAPI_URL: ${AVITO_XAPI_URL:-http://host.docker.internal:8080}
      AVITO_XAPI_API_KEY: ${AVITO_XAPI_API_KEY:-test_dev_key_123}
      MESSENGER_BOT_API_PORT: "9102"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9102:9102"
    volumes:
      - ./app:/app/app
      - ./avito_mcp:/app/avito_mcp
      - ./shared:/app/shared
      - ./tests:/app/tests
      - ./pyproject.toml:/app/pyproject.toml
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  avito-mcp:
    build:
      context: .
      target: runtime
    image: avito-monitor-app:dev
    command: python -m avito_mcp
    env_file: .env
    environment:
      AVITO_XAPI_URL: ${AVITO_XAPI_URL:-http://host.docker.internal:8080}
      AVITO_XAPI_API_KEY: ${AVITO_XAPI_API_KEY:-test_dev_key_123}
      AVITO_MCP_TRANSPORT: ${AVITO_MCP_TRANSPORT:-sse}
      AVITO_MCP_HTTP_HOST: 0.0.0.0
      AVITO_MCP_HTTP_PORT: "9000"
      AVITO_MCP_AUTH_TOKEN: ${AVITO_MCP_AUTH_TOKEN:-dev-mcp-token-change-me}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9000:9000"
    volumes:
      - ./app:/app/app
      - ./avito_mcp:/app/avito_mcp
      - ./shared:/app/shared
      - ./tests:/app/tests
      - ./pyproject.toml:/app/pyproject.toml
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build:
      context: .
      target: runtime
    image: avito-monitor-app:dev
    command: taskiq worker --workers 2 --max-async-tasks 10 app.tasks.broker:broker
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://avito:avito@db:5432/avito_monitor
      REDIS_URL: redis://redis:6379/0
      AVITO_XAPI_URL: ${AVITO_XAPI_URL:-http://host.docker.internal:8080}
      AVITO_XAPI_API_KEY: ${AVITO_XAPI_API_KEY:-test_dev_key_123}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./app:/app/app
      - ./avito_mcp:/app/avito_mcp
      - ./shared:/app/shared
      - ./scripts:/app/scripts
      - ./pyproject.toml:/app/pyproject.toml
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  scheduler:
    build:
      context: .
      target: runtime
    image: avito-monitor-app:dev
    command: taskiq scheduler app.tasks.broker:scheduler
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://avito:avito@db:5432/avito_monitor
      REDIS_URL: redis://redis:6379/0
      AVITO_XAPI_URL: ${AVITO_XAPI_URL:-http://host.docker.internal:8080}
      AVITO_XAPI_API_KEY: ${AVITO_XAPI_API_KEY:-test_dev_key_123}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./app:/app/app
      - ./avito_mcp:/app/avito_mcp
      - ./shared:/app/shared
      - ./pyproject.toml:/app/pyproject.toml
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

volumes:
  db_data:
